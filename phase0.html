function fetchUserCallback(userId, callback) {
    setTimeout(() => {
        console.log("1 second has been passed");
        
        // Simulate server response after 1 second
        const user = { id: userId, name: "Alice" };
        callback(user); // Call the callback with the user data
    }, 3000);
}

// Usage

    console.log("Callback: User received", user.name);
