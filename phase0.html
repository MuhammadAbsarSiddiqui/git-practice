<!DOCTYPE html>
<html>
<head>
    <title>Phase 0 Complete Demo</title>
    <style>
        button { font-size: 18px; padding: 10px; margin: 5px; }
    </style>
</head>
<body>

    <button id="actionBtn">Click me</button>
    <button id="resetBtn">Reset</button>

    <script>
        // Grab both buttons
        const actionBtn = document.getElementById('actionBtn');
        const resetBtn = document.getElementById('resetBtn');

        let clickCount = 0;

        // Action button: change text, background, show alert, increase counter
        actionBtn.addEventListener('click', function() {
            clickCount++;
            actionBtn.textContent = 'Clicked ' + clickCount + ' times';
            actionBtn.style.backgroundColor = 'lightgreen';
            alert('Button clicked! Total: ' + clickCount);
        });

        // Reset button: reset text, background, and counter
        resetBtn.addEventListener('click', function() {
            clickCount = 0;
            actionBtn.textContent = 'Click me';
            actionBtn.style.backgroundColor = '';
            alert('Counter reset');
        });

// Synchronous callback – using forEach
let numbers = [1, 2, 3];
numbers.forEach(function(num) {
    console.log(num * 2);
});
// Output: 2, 4, 6

// Asynchronous callback – using setTimeout
setTimeout(function() {
    console.log("Runs after 1 second");
}, 1000);

// Custom higher-order function that accepts a callback
function doTask(taskName, callback) {
    console.log("Starting task: " + taskName);
    callback(); // call the callback
    console.log("Task finished");
}

doTask("Clean room", function() {
    console.log("Cleaning...");
});
