function checkAge(age) {
    try {
        if (age < 18) {
            throw new Error("You are too young!");
        }
        console.log("Welcome!");
    } catch (err) {
        console.log("Error:", err.message);
    }
}
checkAge(15);  // Error: You are too young!
checkAge(20);  // Welcome!
