<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
            let fruits = ["apple", "banana", "orange", "mango", "grape"];

    // Get items from index 1 to index 3 (index 3 excluded)
    let sliced = fruits.slice(1, 3);
    console.log(sliced);   // ["banana", "orange"]
    console.log(fruits);   // ["apple", "banana", "orange", "mango", "grape"] (unchanged)

    // From index 2 to end
    let fromTwo = fruits.slice(2);
    console.log(fromTwo);  // ["orange", "mango", "grape"]

    // Negative indices: -1 is last, -2 is second last
    let lastTwo = fruits.slice(-2);
    console.log(lastTwo);  // ["mango", "grape"]

    // Copy entire array (shallow copy)
    let copy = fruits.slice();
    console.log(copy);     // same as fruits




    let numbers = [1, 2, 3, 4, 5];
    console.log(numbers);
let reversed = numbers.reverse();


console.log(reversed); // [5, 4, 3, 2, 1]
console.log(numbers);  // [5, 4, 3, 2, 1] (original changed!)
    </script>
</body>
</html>
